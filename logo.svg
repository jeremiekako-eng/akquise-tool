<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80">
<style>
.rs{transform-origin:40px 40px;animation:spin 18s linear infinite}
.ri{transform-origin:40px 40px;animation:spin-r 12s linear infinite}
.pd{animation:pulse 2.5s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spin-r{to{transform:rotate(-360deg)}}
@keyframes pulse{0%,100%{opacity:.65}50%{opacity:.25}}
</style>
